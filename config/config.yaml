# Gida & Saglik Asistani - Merkezi Konfigurasyon
# Not: Bu dosyadaki esik degerlerinin kaynak/birim/dogrulama notlari
# data/knowledge_base/thresholds.json icinde src/data/kb_builder.py tarafindan
# uretilir (bkz. THRESHOLD_METADATA). Buradaki "value" alanlari tek dogruluk kaynagidir.

llm:
  # Varsayilan: huggingface (ucretsiz, kart gerektirmez - kullanici karari 2026-07-09).
  # anthropic/openai odemeli alternatifler olarak korunur (bkz. src/rag/llm_provider.py).
  provider: huggingface   # anthropic | openai | huggingface
  model_anthropic: claude-sonnet-5
  model_openai: gpt-4o-mini
  model_huggingface: meta-llama/Llama-3.1-8B-Instruct
  max_tokens: 1024
  temperature: 0.2

paths:
  raw_data: data/raw
  processed_data: data/processed
  images: data/images
  knowledge_base: data/knowledge_base
  models: models

vision:
  categories:
    - sut_urunu
    - atistirmalik
    - icecek
    - hazir_gida
    - konserve
  image_size: 224
  backbone_primary: mobilenetv3
  backbone_secondary: efficientnet_b3

ocr:
  engines: [easyocr, tesseract]
  languages: [tr, en]

# 100g/100mL bazinda urun-seviyesi "yuksek" esikleri (Nutri-Score/UK FSA front-of-pack
# konvansiyonu - DOGRULANMALI, bkz. data/knowledge_base/docs/nutriscore_thresholds_overview.md)
# + WHO gunluk toplam alim referanslari (DOGRULANDI, WebFetch ile resmi WHO sayfalarindan
# cekildi - bkz. data/knowledge_base/docs/who_salt_reduction.md ve who_sugars_intake.md)
# + veri dogrulama amacli mantik esikleri (Faz 1 validation.py).
thresholds:
  sugar_high_g_per_100g: 22.5
  salt_high_g_per_100g: 1.5
  saturated_fat_high_g_per_100g: 5.0
  sodium_high_mg_per_100g: 600
  who_salt_daily_intake_g: 5
  who_free_sugars_energy_pct: 10
  who_fat_energy_pct_max: 30
  who_saturated_fat_energy_pct_max: 10
  energy_kcal_max_plausible_per_100g: 900

allergens:
  - laktoz
  - gluten
  - findik
  - soya
  - yumurta
  - balik

rag:
  # Embedding API'den alinir (yerel model YOK - diske buyuk dosya inmesin diye, kullanici
  # karari 2026-07-08). Varsayilan huggingface (ucretsiz) - openai odemeli alternatif.
  embedding_provider: huggingface   # huggingface | openai
  embedding_model: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
  top_k: 5
  similarity_threshold: 0.35
